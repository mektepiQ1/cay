<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Platform (A1)</title>
    <style>
        :root { --bg: #09090b; --sidebar: #0f0f11; --card: #18181b; --primary: #8b5cf6; --text: #fafafa; --text-muted: #a1a1aa; --border: #27272a; --drawer-w: 290px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; min-height: 100vh; overflow-x: hidden; }

        /* --- MODERN GİZLİ ÇEKMECE --- */
        .drawer { position: fixed; top: 0; left: calc(-1 * var(--drawer-w)); width: var(--drawer-w); height: 100vh; background: var(--sidebar); border-right: 1px solid var(--border); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 1000; padding: 2.5rem 1.5rem; }
        .drawer.open { transform: translateX(var(--drawer-w)); }
        .drawer h3 { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; color: var(--primary); margin-bottom: 2rem; }
        .cat-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
        .cat-item { padding: 0.8rem 1rem; border-radius: 10px; cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; align-items: center; font-size: 0.95rem; color: var(--text-muted); }
        .cat-item:hover, .cat-item.active { background: rgba(139, 92, 246, 0.1); color: #fff; font-weight: 600; }
        .cat-item.active { border-left: 3px solid var(--primary); border-radius: 4px 10px 10px 4px; }
        .cat-count { background: #27272a; padding: 0.15rem 0.5rem; border-radius: 20px; font-size: 0.75rem; color: #fff; }

        /* --- ÜST BAR & ARAMA MOTORU --- */
        .viewport { flex-grow: 1; padding: 2rem; margin-left: 0; transition: 0.3s; width: 100%; max-width: 100vw; }
        header { display: flex; justify-content: space-between; align-items: center; gap: 1.5rem; margin-bottom: 2.5rem; background: var(--card); padding: 1.2rem 2rem; border-radius: 16px; border: 1px solid var(--border); }
        .header-left { display: flex; align-items: center; gap: 1.5rem; }
        
        .trigger-btn { background: var(--primary); color: #fff; border: none; padding: 0.7rem 1.2rem; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .trigger-btn:hover { background: #a78bfa; }
        header h1 { font-size: 1.4rem; font-weight: 800; }
        header h1 span { color: var(--primary); }
        
        .search-box { position: relative; width: 300px; }
        .search-box input { width: 100%; padding: 0.6rem 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: #fff; font-size: 0.9rem; }
        .search-box input:focus { border-color: var(--primary); outline: none; }

        /* --- KART YAPISI (DAHA KOMPAKT VE ZARİF) --- */
        /* Genişlik 300px'e düşürüldü, kutular daha fit duracak */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 300px), 1fr)); gap: 1.5rem; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); display: flex; flex-direction: column; transition: transform 0.3s, border-color 0.3s; cursor: pointer; position: relative;}
        .card:hover { transform: translateY(-3px); border-color: var(--primary); }
        
        /* Padding azaltıldı, iç boşluklar daraltıldı */
        .card-body { padding: 1.2rem; display: flex; flex-direction: column; z-index: 2; background: var(--card); }
        .card-cat { font-size: 0.65rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.3rem; }
        .card h4 { font-size: 1.1rem; margin-bottom: 0.4rem; color: #fff; font-weight: 700; }
        .card-desc { color: var(--text-muted); font-size: 0.85rem; line-height: 1.5; white-space: pre-line; }
        
        .toggle-hint { margin-top: 1rem; align-self: flex-start; font-size: 0.75rem; font-weight: 700; color: var(--primary); background: rgba(139, 92, 246, 0.1); padding: 0.4rem 1rem; border-radius: 20px; transition: 0.2s; }
        .card:hover .toggle-hint { background: var(--primary); color: #fff; box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }

        /* --- VİDEO ÇEKMECESİ --- */
        .media-drawer { 
            width: 100%; 
            height: 0; 
            opacity: 0; 
            background: #000; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            transition: height 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease; 
        }
        
        /* Çekmece yüksekliği daha orantılı hale getirildi (320px) */
        .card.open .media-drawer { 
            height: 320px; 
            opacity: 1; 
            border-top: 1px solid var(--border); 
        }

        .media-drawer video, .media-drawer img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: none; 
        }
        .preload-text { display: none; color: var(--text-muted); font-size: 0.8rem; font-style: italic; }

        .blur-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7); z-index: 999; display: none; backdrop-filter: blur(5px); }

        /* --- MOBİL UYARLAMA (RESPONSIVE) --- */
        @media (max-width: 768px) {
            .viewport { padding: 1rem; }
            header { flex-direction: column; align-items: stretch; padding: 1rem; gap: 1rem; margin-bottom: 1.5rem; }
            .header-left { justify-content: space-between; width: 100%; }
            .search-box { width: 100%; }
            
            /* Mobilde video yüksekliği daha kibar tutuldu */
            .card.open .media-drawer { height: 220px; }
            .card-body { padding: 1rem; }
        }
    </style>
</head>
<body>

    <div class="blur-overlay" id="blurOverlay" onclick="toggleDrawer()"></div>

    <div class="drawer" id="appDrawer">
        <h3>📂 Kategoriler</h3>
        <ul class="cat-list" id="catContainer"></ul>
    </div>

    <div class="viewport">
        <header>
            <div class="header-left">
                <button class="trigger-btn" onclick="toggleDrawer()">☰ Menü</button>
                <h1>STREAM<span>CORE</span></h1>
            </div>
            <div class="search-box">
                <input type="text" id="searchBar" placeholder="Egzersiz ara..." oninput="filterSearch()">
            </div>
        </header>

        <div class="grid" id="cardGrid"></div>
    </div>

    <script>
        let db;
        let masterData = [];
        let selectedCat = 'Tümü';
        let activeUrls = [];

        const request = indexedDB.open("ProductionSportsDB", 1);
        request.onsuccess = (e) => { db = e.target.result; syncDatabase(); };

        function syncDatabase() {
            const store = db.transaction(["exercises"], "readonly").objectStore("exercises");
            store.getAll().onsuccess = (e) => {
                masterData = e.target.result.sort((a,b) => b.createdAt - a.createdAt);
                buildDrawer();
                renderCards(masterData);
            };
        }

        function toggleDrawer() {
            const drawer = document.getElementById('appDrawer');
            const overlay = document.getElementById('blurOverlay');
            drawer.classList.toggle('open');
            overlay.style.display = drawer.classList.contains('open') ? 'block' : 'none';
        }

        function buildDrawer() {
            const container = document.getElementById('catContainer');
            container.innerHTML = '';
            
            const stats = { 'Tümü': masterData.length };
            masterData.forEach(d => stats[d.category] = (stats[d.category] || 0) + 1);

            Object.keys(stats).forEach(cat => {
                const li = document.createElement('li');
                li.className = `cat-item ${selectedCat === cat ? 'active' : ''}`;
                li.innerHTML = `<span>${cat}</span><span class="cat-count">${stats[cat]}</span>`;
                li.onclick = (e) => {
                    e.stopPropagation();
                    selectedCat = cat;
                    buildDrawer();
                    applyFilters();
                    toggleDrawer();
                };
                container.appendChild(li);
            });
        }

        function renderCards(dataset) {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = '';
            
            activeUrls.forEach(u => URL.revokeObjectURL(u));
            activeUrls = [];

            if(dataset.length === 0) {
                grid.innerHTML = '<p style="color:var(--text-muted); grid-column:1/-1; text-align:center; padding: 4rem;">Gösterilecek veri bulunamadı.</p>';
                return;
            }

            dataset.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('onclick', `handleVideoDrawer(${item.id}, this)`);
                
                card.innerHTML = `
                    <div class="card-body">
                        <span class="card-cat">${item.category}</span>
                        <h4>${item.title}</h4>
                        <p class="card-desc">${item.desc}</p>
                        <div class="toggle-hint" id="hint-${item.id}">▶ Videoyu Aç</div>
                    </div>
                    <div class="media-drawer" id="stage-${item.id}">
                        <div class="preload-text" id="pre-${item.id}">Medya getiriliyor...</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function handleVideoDrawer(id, cardEl) {
            const stage = document.getElementById(`stage-${id}`);
            const text = document.getElementById(`pre-${id}`);
            const hint = document.getElementById(`hint-${id}`);

            const isOpen = cardEl.classList.toggle('open');
            hint.innerHTML = isOpen ? '▼ Videoyu Kapat' : '▶ Videoyu Aç';

            if (cardEl.dataset.mediaLoaded === "true") {
                const videoEl = stage.querySelector('video');
                if (videoEl) {
                    if (isOpen) videoEl.play();
                    else videoEl.pause();
                }
                return;
            }

            text.style.display = 'block';

            db.transaction(["exercises"],"readonly").objectStore("exercises").get(id).onsuccess = (e) => {
                const item = e.target.result;
                const blobUrl = URL.createObjectURL(item.mediaBlob);
                activeUrls.push(blobUrl);

                text.style.display = 'none';
                cardEl.dataset.mediaLoaded = "true"; 

                if(item.mediaType.startsWith('video/')) {
                    const video = document.createElement('video');
                    video.src = blobUrl; video.autoplay = true; video.loop = true; video.muted = true; video.controls = false; video.playsInline = true;
                    video.style.display = 'block';
                    stage.appendChild(video);
                } else {
                    const img = document.createElement('img');
                    img.src = blobUrl; img.style.display = 'block';
                    stage.appendChild(img);
                }
            };
        }

        function applyFilters() {
            const searchVal = document.getElementById('searchBar').value.toLowerCase();
            let filtered = masterData;

            if (selectedCat !== 'Tümü') {
                filtered = filtered.filter(d => d.category === selectedCat);
            }
            if (searchVal) {
                filtered = filtered.filter(d => d.title.toLowerCase().includes(searchVal));
            }
            renderCards(filtered);
        }

        function filterSearch() { applyFilters(); }
        window.addEventListener('focus', () => { if(db) syncDatabase(); });
    </script>
</body>
</html>
