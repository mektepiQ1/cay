<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Öğrenci Uygulaması</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff0505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="log.jpg">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #ff0505; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .logo {
            width: 75%;
            max-width: 240px;
            border-radius: 50%;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .btn {
            background-color: white;
            color: #ff0505;
            border: none;
            padding: 16px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            width: 100%;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn:active {
            transform: scale(0.97);
            background-color: #f0f0f0;
        }

        /* Yükle butonu tasarımı */
        #installBtn {
            background-color: #1a1a1a;
            color: white;
            border: 2px solid white;
        }

        #installBtn:active {
            background-color: #333;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="log.jpg" alt="Öğrenci Logo" class="logo">

        <div class="btn-container">
            <a href="https://anauyg.infinityfree.me/ogrenci.php" target="_blank" rel="noopener noreferrer" class="btn">Giriş Yap</a>
            <button id="installBtn" class="btn">Uygulamayı Yükle</button>
        </div>
    </div>

    <script>
        // Arka plan servis kaydı
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker aktif.'))
                    .catch(err => console.log('Hata:', err));
            });
        }

        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('Uygulama kuruldu.');
                }
                deferredPrompt = null;
            } else {
                alert('Uygulama zaten telefonunuzda yüklü olabilir. Lütfen ana ekranınızı kontrol edin veya logoya tıklayarak giriş yapın.');
            }
        });

        window.addEventListener('appinstalled', () => {
            installBtn.textContent = "Uygulama Yüklendi ✅";
            installBtn.style.backgroundColor = "#27ae60";
            installBtn.disabled = true;
        });
    </script>
</body>
</html>
