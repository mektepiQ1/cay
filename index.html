<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PWA Uygulamam</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* buton tıklamalarında metin seçilmesini engeller */
        }

        body {
            width: 100vw;
            height: 100vh;
            background: url('log.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: flex-end;   /* butonları alta yaslar */
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* karartma efekti (opsiyonel, okunabilirlik için) */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 1;
        }

        .button-container {
            position: relative;
            z-index: 2;
            margin-bottom: 50px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 80%;
            max-width: 300px;
            text-align: center;
        }

        .btn {
            padding: 16px 20px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            background-color: #ff7b00;
            color: white;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-devam {
            background-color: #1e88e5;
        }

        .btn-devam:hover {
            background-color: #0b5e9e;
        }

        .btn-indir {
            background-color: #2e7d32;
        }

        .btn-indir:hover {
            background-color: #1b5e20;
        }

        /* Mobil uyum */
        @media (max-width: 600px) {
            .button-container {
                margin-bottom: 30px;
                width: 85%;
            }
            .btn {
                padding: 14px 18px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

<div class="button-container">
    <button class="btn btn-devam" id="devamButonu">🚀 Devam Et</button>
    <button class="btn btn-indir" id="indirButonu">📲 Uygulamayı Yükle</button>
</div>

<script>
    // Devam Et butonu: yönlendirme
    const devamBtn = document.getElementById('devamButonu');
    devamBtn.addEventListener('click', () => {
        window.location.href = 'https://ogarayuz.infinityfree.io/ogrenci.php?hl=tr-TR';
    });

    // PWA Kurulumu (indir butonu)
    let deferredPrompt;
    const indirBtn = document.getElementById('indirButonu');

    // Önce beforeinstallprompt event'ini yakala
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // İndir butonunu görünür yap (zaten görünür, ama devre dışı değil)
        indirBtn.style.display = 'block';
    });

    // İndir butonuna tıklandığında kurulum prompt'u göster
    indirBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`Kullanıcı kurulumu ${outcome === 'accepted' ? 'onayladı' : 'reddetti'}`);
            deferredPrompt = null;
        } else {
            // Eğer prompt daha önce gösterilmediyse veya PWA zaten kurulduysa
            alert('Tarayıcınız kurulumu desteklemiyor veya uygulama zaten kurulmuş olabilir. Mobil cihazda "Menü > Uygulamayı Yükle" seçeneğini deneyin.');
        }
    });

    // Service Worker kaydı (PWA'nın çalışması için)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/service-worker.js')
                .then(reg => console.log('Service Worker kaydedildi:', reg))
                .catch(err => console.log('Service Worker hatası:', err));
        });
    }
</script>
</body>
</html>
