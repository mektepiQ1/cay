<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğrenci Uygulaması</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff0505">
    <link rel="apple-touch-icon" href="log.jpg">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ff0505; /* Logodaki kırmızı tonu */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .logo {
            width: 80%;
            max-width: 250px;
            border-radius: 50%;
            margin-bottom: 40px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .btn {
            background-color: white;
            color: #ff0505;
            border: none;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            width: 100%;
            text-decoration: none;
            display: inline-block;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Yükle butonu varsayılan olarak dikkat çekici olsun */
        #installBtn {
            background-color: #222;
            color: white;
            border: 2px solid white;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="log.jpg" alt="Öğrenci Logo" class="logo">

        <div class="btn-container">
            <a href="https://ogarayuz.infinityfree.io/ogrenci.php" class="btn">Giriş Yap</a>
            <button id="installBtn" class="btn">Uygulamayı Yükle</button>
        </div>
    </div>

    <script>
        // Service Worker Kaydı (PWA için zorunlu)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker kayıt başarılı.'))
                    .catch(err => console.log('Service Worker kaydı başarısız:', err));
            });
        }

        // PWA Yükleme Mantığı
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            // Tarayıcının varsayılan kurulum balonunu engelle
            e.preventDefault();
            // Etkinliği daha sonra kullanmak üzere sakla
            deferredPrompt = e;
            // Yükle butonunu aktif hale getir veya görünür kıl
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                // Kurulum istemini göster
                deferredPrompt.prompt();
                // Kullanıcının yanıtını bekle
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('Kullanıcı uygulamayı yükledi.');
                } else {
                    console.log('Kullanıcı yüklemeyi reddetti.');
                }
                deferredPrompt = null;
            } else {
                alert('Uygulama zaten yüklü veya tarayıcınız (veya cihazınız) şu an bu özelliği desteklemiyor. Chrome/Edge/Safari kullanarak girmeyi deneyin.');
            }
        });

        // Uygulama başarıyla yüklendiğinde tetiklenir
        window.addEventListener('appinstalled', () => {
            console.log('Uygulama telefona başarıyla yüklendi!');
            installBtn.textContent = "Uygulama Yüklendi";
            installBtn.disabled = true;
        });
    </script>
</body>
</html>
