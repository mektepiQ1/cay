<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Öğrenci Sistemi</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FF0000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #FF0000; /* image_4.png kırmızı tonu */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        /* Arka plan resmi tam kaplama */
        .bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('log.jpg') no-repeat center center;
            background-size: contain; /* Logonun kesilmemesi için contain, istersen cover yap */
            z-index: 1;
        }

        /* Karartma veya kontrast katmanı gerekirse (İsteğe bağlı) */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.05);
            z-index: 2;
        }

        /* Alt taraftaki buton alanı */
        .button-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 3;
            margin-top: auto; /* En alta ittirir */
            margin-bottom: 20px; /* Cihaz alt boşluğu */
        }

        /* İstediğin Beyaz Buton Standartları */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: transform 0.1s ease, opacity 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Devam Et Butonu */
        .btn-continue {
            background-color: #FFFFFF;
            color: #FF0000;
        }

        /* Uygulamayı İndir Butonu */
        .btn-download {
            background-color: #FFFFFF;
            color: #FF0000;
            display: none; /* Sadece yüklenebilir cihazlarda JS ile açılacak */
        }

        /* Buton tıklama efekti (Mobil uyumlu) */
        .btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>
    <div class="overlay"></div>

    <div class="button-container">
        <!-- Devam Et Butonu -->
        <a href="https://ogarayuz.infinityfree.io/ogrenci.php?hl=tr-TR" class="btn btn-continue">Devam Et</a>
        
        <!-- Uygulama gibi Yükle Butonu -->
        <button id="installBtn" class="btn btn-download">Uygulamayı İndir</button>
    </div>

    <script>
        // 1. Service Worker Kayıt (PWA için şart)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Kayıt Başarılı'))
                    .catch(err => console.log('SW Hatası:', err));
            });
        }

        // 2. PWA Kurulum Mantığı (İndir butonunu tetikleme)
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            // Tarayıcının varsayılan kurulum istemini engelle
            e.preventDefault();
            // İistemi sakla
            deferredPrompt = e;
            // Tarayıcı PWA kurulumunu destekliyorsa İndir butonunu görünür yap
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                // Kurulum istemini kullanıcıya göster
                deferredPrompt.prompt();
                // Kullanıcının cevabını bekle
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`Kullanıcı seçimi: ${outcome}`);
                // İstem kullanıldı, sıfırla
                deferredPrompt = null;
                // Butonu tekrar gizle
                installBtn.style.display = 'none';
            }
        });

        // Uygulama zaten kurulmuşsa butonu gizle
        window.addEventListener('appinstalled', () => {
            console.log('Uygulama başarıyla ana ekrana yüklendi.');
            installBtn.style.display = 'none';
            deferredPrompt = null;
        });
    </script>
</body>
</html>
