<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Profesyonel Yönlendirme | Yumuşak Lacivert Butonlar</title>
    <style>
        /* ------------------------------
            RESET & LACİVERT / BEYAZ TEMA
        -------------------------------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-soft: #f0f4fa;          /* çok açık mavimsi beyaz arka plan */
            --card-bg: rgba(255, 255, 255, 0.85);
            --btn-bg: #2c5a7a;           /* yumuşak lacivert (ana buton arka planı) */
            --btn-bg-hover: #1f4662;      /* hoverda biraz koyulaşan lacivert */
            --btn-text: #ffffff;          /* beyaz yazı */
            --btn-border: rgba(255, 255, 255, 0.25);
            --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 20px 30px -12px rgba(26, 62, 96, 0.25);
            --focus-ring: #8ab3cf;
        }

        body {
            background: linear-gradient(125deg, #eef2f8 0%, #e3e9f2 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Ana konteyner – tam ortada, yumuşak cam efekti */
        .button-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            background: var(--card-bg);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            padding: 2.5rem 3rem;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        /* PROFESYONEL BUTONLAR – yumuşak lacivert arka plan, beyaz metin */
        .nav-btn {
            display: inline-block;
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            font-weight: 500;
            font-family: inherit;
            letter-spacing: 0.3px;
            color: var(--btn-text);
            border-radius: 3rem;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: var(--shadow-sm);
            text-align: center;
            min-width: 180px;
        }

        /* Hover – daha koyu lacivert, hafif yükselme */
        .nav-btn:hover {
            background: var(--btn-bg-hover);
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 18px 28px -12px rgba(0, 30, 60, 0.3);
        }

        /* Aktif tıklama */
        .nav-btn:active {
            transform: translateY(2px);
            transition: 0.05s;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }

        /* Erişilebilirlik için odak halkası (açık mavi) */
        .nav-btn:focus-visible {
            outline: 3px solid var(--focus-ring);
            outline-offset: 3px;
            border-radius: 3rem;
        }

        /* Mobil düzen – butonlar alt alta, tam genişlik değil ama okunabilir */
        @media (max-width: 640px) {
            .button-container {
                flex-direction: column;
                gap: 1.5rem;
                padding: 2rem 1.8rem;
                width: 100%;
                max-width: 400px;
                border-radius: 1.8rem;
            }
            .nav-btn {
                width: 100%;
                min-width: unset;
                padding: 0.9rem 1.5rem;
                font-size: 1.1rem;
            }
        }

        /* Geniş ekranlarda butonlar biraz daha geniş */
        @media (min-width: 1600px) {
            .nav-btn {
                padding: 1.2rem 3rem;
                font-size: 1.3rem;
                min-width: 220px;
            }
            .button-container {
                gap: 3rem;
                padding: 3rem 4rem;
            }
        }

        /* Hafif arka plan dokusu (incelik) */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle at 30% 20%, rgba(44, 90, 122, 0.03) 0%, transparent 70%);
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="button-container">
        <!-- BUTON 1 – yumuşak lacivert arka plan -->
        <button class="nav-btn" id="professionalBtnOne">Soru Cevap Kavanozu</button>

        <!-- BUTON 2 – yumuşak lacivert arka plan -->
        <button class="nav-btn" id="professionalBtnTwo">Hap Bilgi Kavanozu</button>
    </div>

    <script>
        (function() {
            // ============================================================
            // YÖNLENDİRME LİNKLERİ – KULLANICI TARAFINDAN DOLDURULACAK
            // ============================================================
            // ★★★ AŞAĞIDAKİ İKİ DEĞİŞKENİ İSTEDİĞİNİZ URL İLE DEĞİŞTİRİN ★★★
            // Örnek: "https://www.sirketiniz.com/hizmetler" veya "/hakkimizda" veya "#"
            
            const firstButtonUrl = "https://mektepiq1.github.io/cay/sorucevapmanuelkavanoz.html";   // <--- BURAYI DÜZENLEYİN
            const secondButtonUrl = "https://mektepiq1.github.io/cay/bilgimanuelkavanoz.html";  // <--- BURAYI DÜZENLEYİN
            
            // Not: Göreceli yollar da kullanabilirsiniz, örn: "./iletisim", "/projeler"
            // ============================================================
            
            const btn1 = document.getElementById('professionalBtnOne');
            const btn2 = document.getElementById('professionalBtnTwo');
            
            function navigateTo(url, buttonName) {
                if (!url || url.trim() === "") {
                    console.warn(`⚠️ ${buttonName} için geçerli bir URL tanımlanmamış.`);
                    alert(`Yönlendirme linki henüz ayarlanmamış.\nLütfen JavaScript kodundaki "${buttonName === "Soru Cevap Kavanozu" ? "firstButtonUrl" : "secondButtonUrl"}" değişkenini doldurun.`);
                    return;
                }
                window.location.href = url;
            }
            
            if (btn1) {
                btn1.addEventListener('click', (e) => {
                    e.preventDefault();
                    navigateTo(firstButtonUrl, "Soru Cevap Kavanozu");
                });
                btn1.title = firstButtonUrl && firstButtonUrl !== "https://www.example.com/sayfa-bir" ? `Yönlendir: ${firstButtonUrl}` : "Yönlendirme linki henüz ayarlanmadı";
            }
            
            if (btn2) {
                btn2.addEventListener('click', (e) => {
                    e.preventDefault();
                    navigateTo(secondButtonUrl, "Hap Bilgi Kavanozu");
                });
                btn2.title = secondButtonUrl && secondButtonUrl !== "https://www.example.com/sayfa-iki" ? `Yönlendir: ${secondButtonUrl}` : "Yönlendirme linki henüz ayarlanmadı";
            }
            
            console.log(
                "%c🔷 PROFESYONEL PANEL | Yumuşak Lacivert Butonlar | Yönlendirme linklerini düzenleyin:", 
                "color: #2c5a7a; font-weight: 600;"
            );
            console.log("• firstButtonUrl = ", firstButtonUrl);
            console.log("• secondButtonUrl = ", secondButtonUrl);
            
            if (firstButtonUrl === "https://www.example.com/sayfa-bir" || secondButtonUrl === "https://www.example.com/sayfa-iki") {
                console.warn("⚠️ Henüz örnek linkler aktif. Lütfen kendi URL'lerinizi girin.");
            }
        })();
    </script>
</body>
</html>
