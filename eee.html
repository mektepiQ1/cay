<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Macro Analyzer - Ultra Pro</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #06070d 0%, #0b0d19 100%);
            --card-bg: rgba(18, 22, 39, 0.7);
            --accent-glow: #00f0ff;
            --accent-dim: rgba(0, 240, 255, 0.1);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .app-container {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            padding: 35px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 0 0 40px rgba(0, 240, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, var(--accent-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
        }

        header p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 6px;
        }

        .action-zone {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .hidden-input {
            display: none;
        }

        .btn-upload {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 15px;
            color: var(--text-main);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.25s ease;
        }

        .btn-upload:hover {
            border-color: var(--accent-glow);
            background: var(--accent-dim);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 240, 255, 0.1);
        }

        .btn-upload svg {
            width: 24px;
            height: 24px;
            fill: var(--accent-glow);
        }

        .preview-wrapper {
            position: relative;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 25px;
            display: none;
            border: 1px solid rgba(0, 240, 255, 0.3);
        }

        #imagePreview {
            width: 100%;
            height: auto;
            display: block;
            max-height: 300px;
            object-fit: cover;
        }

        .btn-analyze {
            background: var(--accent-glow);
            color: #04060a;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 240, 255, 0.3);
            display: none;
        }

        .btn-analyze:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 25px rgba(0, 240, 255, 0.5);
        }

        .loader-container {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        .shimmer-text {
            font-size: 14px;
            color: var(--accent-glow);
            letter-spacing: 1px;
            animation: pulse 1.8s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; text-shadow: 0 0 10px var(--accent-glow); }
        }

        .results-panel {
            display: none;
            margin-top: 25px;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .macro-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .macro-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .macro-title {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .macro-value {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
        }

        .macro-bar-bg {
            background: rgba(255, 255, 255, 0.05);
            height: 6px;
            border-radius: 3px;
            width: 100%;
            overflow: hidden;
        }

        .macro-bar-fill {
            height: 100%;
            width: 0%;
            border-radius: 3px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .calories .macro-bar-fill { background: var(--accent-glow); box-shadow: 0 0 10px var(--accent-glow); }
        .protein .macro-bar-fill { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .carb .macro-bar-fill { background: #f59e0b; box-shadow: 0 0 10px #f59e0b; }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>AI Macro Analyzer</h1>
            <p>Yemeğin fotoğrafını çek veya yükle</p>
        </header>

        <div class="action-zone">
            <div class="btn-upload" onclick="document.getElementById('cameraInput').click()">
                <svg viewBox="0 0 24 24"><path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2m8 3a5 5 0 0 0-5 5 5 5 0 0 0 5 5 5 5 0 0 0 5-5 5 5 0 0 0-5-5m0 2a3 3 0 0 1 3 3a3 3 0 0 1-3 3a3 3 0 0 1-3-3a3 3 0 0 1 3-3Z"/></svg>
                <span>Fotoğraf Çek</span>
            </div>
            <input type="file" id="cameraInput" class="hidden-input" accept="image/*" capture="environment">

            <div class="btn-upload" onclick="document.getElementById('galleryInput').click()">
                <svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14c1.1 0 2-.9 2-2v-7h-2v7m-7.86-5.14L9 11.25l-2.75 3.54h11.5l-3.5-4.67-2.11 2.74M21 3h-3V0h-2v3h-3v2h3v3h2V5h3V3Z"/></svg>
                <span>Galeriden Seç</span>
            </div>
            <input type="file" id="galleryInput" class="hidden-input" accept="image/*">
        </div>

        <div class="preview-wrapper" id="previewWrapper">
            <img id="imagePreview" src="" alt="Yemek Önizleme">
        </div>

        <button id="analyzeBtn" class="btn-analyze">Gelişmiş Analizi Başlat</button>

        <div class="loader-container" id="loader">
            <div class="shimmer-text">GÖRSEL OPTİMİZE EDİLİYOR VE ANALİZ EDİLİYOR...</div>
        </div>

        <div class="results-panel" id="resultsPanel">
            <div class="macro-card calories">
                <div class="macro-header">
                    <span class="macro-title">Enerji (Kalori)</span>
                    <span class="macro-value" id="calValue">-</span>
                </div>
                <div class="macro-bar-bg"><div class="macro-bar-fill" id="calBar"></div></div>
            </div>

            <div class="macro-card protein">
                <div class="macro-header">
                    <span class="macro-title">Protein</span>
                    <span class="macro-value" id="proValue">-</span>
                </div>
                <div class="macro-bar-bg"><div class="macro-bar-fill" id="proBar"></div></div>
            </div>

            <div class="macro-card carb">
                <div class="macro-header">
                    <span class="macro-title">Karbonhidrat</span>
                    <span class="macro-value" id="carbValue">-</span>
                </div>
                <div class="macro-bar-bg"><div class="macro-bar-fill" id="carbBar"></div></div>
            </div>
        </div>
    </div>

    <script>
        // Üst Düzey Yapılandırma
        const CONFIG = {
            apiKey: "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",
            apiUrl: "https://api.groq.com/openai/v1/chat/completions",
            model: "llama-3.2-11b-vision-preview"
        };

        const elements = {
            cameraInput: document.getElementById('cameraInput'),
            galleryInput: document.getElementById('galleryInput'),
            previewWrapper: document.getElementById('previewWrapper'),
            imagePreview: document.getElementById('imagePreview'),
            analyzeBtn: document.getElementById('analyzeBtn'),
            loader: document.getElementById('loader'),
            resultsPanel: document.getElementById('resultsPanel')
        };

        let optimizedBase64 = "";

        // Görselleri İşleme Mekanizması
        [elements.cameraInput, elements.galleryInput].forEach(input => {
            input.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                // Arayüz sıfırlama
                elements.previewWrapper.style.display = 'none';
                elements.analyzeBtn.style.display = 'none';
                elements.resultsPanel.style.display = 'none';

                // Görseli Canvas ile sıkıştır ve boyutlandır
                optimizedBase64 = await optimizeImage(file, 1024);
                
                elements.imagePreview.src = optimizedBase64;
                elements.previewWrapper.style.display = 'block';
                elements.analyzeBtn.style.display = 'block';
                elements.analyzeBtn.innerText = "Yemeği Analiz Et";
            });
        });

        // Profesyonel Görsel Sıkıştırma Fonksiyonu
        function optimizeImage(file, maxDimension) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > maxDimension) {
                                height *= maxDimension / width;
                                width = maxDimension;
                            }
                        } else {
                            if (height > maxDimension) {
                                width *= maxDimension / height;
                                height = maxDimension;
                            }
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.82)); // 0.82 Kalite oranı optimizasyonu
                    };
                };
            });
        }

        // Analiz Tetikleme
        elements.analyzeBtn.addEventListener('click', async () => {
            if (!optimizedBase64) return;

            elements.analyzeBtn.style.display = 'none';
            elements.loader.style.display = 'block';
            elements.resultsPanel.style.display = 'none';

            try {
                const response = await fetch(CONFIG.apiUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${CONFIG.apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: CONFIG.model,
                        messages: [
                            {
                                role: "user",
                                content: [
                                    {
                                        type: "text",
                                        text: "Analyze this meal photo. Estimate its portion size and calculate its macros. You MUST reply ONLY with a valid JSON object matching this structure: {\"calories\": 350, \"protein\": 25, \"carbs\": 40}. Replace the values with your estimations based on the image. Do not add any text or explanation outside the JSON."
                                    },
                                    {
                                        type: "image_url",
                                        image_url: { url: optimizedBase64 }
                                    }
                                ]
                            }
                        ],
                        response_format: { type: "json_object" },
                        temperature: 0.2
                    })
                });

                if (!response.ok) throw new Error(`API Return Status: ${response.status}`);

                const data = await response.json();
                const rawJson = JSON.parse(data.choices[0].message.content);

                // Sonuçları Ekrana Dağıtma ve Barları Tetikleme
                renderResults(rawJson);

            } catch (error) {
                console.error("Critical System Error:", error);
                alert("Analiz sırasında bir bağlantı hatası oluştu. Lütfen tekrar deneyin.");
                elements.analyzeBtn.style.display = 'block';
                elements.loader.style.display = 'none';
            }
        });

        function renderResults(data) {
            elements.loader.style.display = 'none';
            elements.resultsPanel.style.display = 'block';
            elements.analyzeBtn.style.display = 'block';
            elements.analyzeBtn.innerText = "Yeniden Analiz Et";

            // Değerleri yazdır
            document.getElementById('calValue').innerText = `${data.calories} kcal`;
            document.getElementById('proValue').innerText = `${data.protein} g`;
            document.getElementById('carbValue').innerText = `${data.carbs} g`;

            // Grafik barlarını canlandır (Maksimum referans değerlerine göre oranlanır)
            setTimeout(() => {
                document.getElementById('calBar').style.width = `${Math.min((data.calories / 1200) * 100, 100)}%`;
                document.getElementById('proBar').style.width = `${Math.min((data.protein / 60) * 100, 100)}%`;
                document.getElementById('carbBar').style.width = `${Math.min((data.carbs / 150) * 100, 100)}%`;
            }, 100);
        }
    </script>
</body>
</html>
